<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCoin (UC) | Official Website</title>
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/todfd5.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #02040a;
            --card: rgba(255, 255, 255, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Animated Background Particles */
        .bg-stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.05) 0%, transparent 80%);
            z-index: -1;
        }

        /* Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(2, 4, 10, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand { font-size: 26px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* Hero Section */
        .hero {
            padding: 100px 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .hero-logo {
            width: 160px; height: 160px; border-radius: 50%;
            border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 25px; animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .hero h1 { font-size: clamp(45px, 10vw, 80px); font-weight: 900; line-height: 1; margin-bottom: 15px; }
        .hero h1 span { color: var(--gold); }
        .hero p { color: #94a3b8; max-width: 600px; font-size: 18px; margin-bottom: 35px; }

        /* Social Icons Row (Fixed & Visible) */
        .social
