<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCoin (UC) | Official</title>
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/todfd5.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #03050a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* No scrolling for pure hero feel */
        }

        /* Ambient Background Glows */
        .glow-1 {
            position: absolute; top: 10%; left: 10%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            z-index: -1;
        }
        .glow-2 {
            position: absolute; bottom: 10%; right: 10%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .hero-container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            z-index: 10;
        }

        /* Image & Animation */
        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .logo-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Text Styling */
        h1 {
            font-size: clamp(48px, 12vw, 85px);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .supply-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        /* CA Box */
        .ca-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .ca-card:hover { border-color: var(--gold); }
        .ca-card p { font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; font-weight: 700; }
        code {
            display: block;
            font-family: monospace;
            font-size: clamp(11px, 3.5vw, 15px);
            color: #ddd;
            margin-bottom: 15px;
            word-break: break-all;
        }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,215,0,0.3); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        /* Social Icons */
        .socials {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .socials a { color: #666; text-decoration: none; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .socials a:hover { color: var(--gold); }

        @media (max-width: 480px) {
            .hero-container { padding: 10px; }
            h1 { font-size: 60px; }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="hero-container">
        <div class="logo-wrap">
            <img src="https://files.catbox.moe/todfd5.jpg" alt="UCoin Logo" class="logo-img">
        </div>

        <br>
        <span class="supply-badge">1,000,000 SUPPLY</span>
        
        <h1>UCOIN</h1>
        <p style="color: #888; margin-bottom: 30px; font-size: 16px;">The Alpha Community Token on Solana.</p>

        <div class="ca-card">
            <p>CONTRACT ADDRESS</p>
            <code id="ca">Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt</code>
            <button class="btn btn-outline" style="font-size: 12px; padding: 8px 20px;" onclick="copyCA()" id="copyBtn">Copy Address</button>
        </div>

        <div class="btn-row">
            <a href="https://jup.ag/swap?outputMint=Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt" class="btn btn-gold">Buy on Jupiter</a>
            <a href="https://dexscreener.com/solana/Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt" class="btn btn-outline">Live Chart</a>
        </div>

        <div class="socials">
            <a href="https://t.me/ucoin_live" target="_blank">TELEGRAM</a>
            <a href="https://x.com/UCoin_live" target="_blank">TWITTER / X</a>
            <a href="https://www.instagram.com/ucoin_live" target="_blank">INSTAGRAM</a>
        </div>
    </div>

    <script>
        function copyCA() {
            const text = document.getElementById("ca").innerText;
            const btn = document.getElementById("copyBtn");
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = "✔ Copied!";
                btn.style.color = "#00ff9d";
                setTimeout(() => {
                    btn.innerText = "Copy Address";
                    btn.style.color = "#fff";
                }, 2000);
            });
        }
    </script>
</body>
</html>
