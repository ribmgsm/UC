    <style>
        :root {
            --gold: #FFD700;
            --bg: #03050a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ambient Glow */
        .glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
            z-index: -1;
        }

        /* FIXED NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(3, 5, 10, 0.9);
            backdrop-filter: blur(15px);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-logo { font-size: 20px; font-weight: 900; color: var(--gold); text-decoration: none; }

        .nav-links { display: flex; gap: 15px; } 
        .nav-links a {
            color: #fff; text-decoration: none;
            font-size: 13px; font-weight: 700; 
            text-transform: uppercase;
            padding: 5px 8px;
        }
        .nav-links a:hover { color: var(--gold); }

        /* HERO AREA */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 140px 20px 60px;
        }

        .logo-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid var(--gold); box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            margin-bottom: 25px; animation: float 4s ease-in-out infinite;
            object-fit: cover;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 {
            font-size: clamp(55px, 15vw, 100px); font-weight: 900;
            line-height: 0.9; margin-bottom: 20px; letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .supply-tag {
            color: var(--gold); font-weight: 800; font-size: 14px;
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
        }

            margin-bottom: 35px; backdrop-filter: blur(10px);
        }
