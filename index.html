<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCoin (UC)</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(180deg,#05070d,#02040a);
  color:white;
  overflow-x:hidden;
}

/* glow background */
body::before{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(gold,transparent);
  top:-100px;
  left:-100px;
  filter:blur(120px);
  opacity:0.3;
  animation:move 8s infinite alternate;
}
@keyframes move{
  to{ top:200px; left:60%; }
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}
nav a{color:white;text-decoration:none;margin:0 10px}

.hero{text-align:center;padding:80px 20px;}

.logo{
  width:160px;
  border-radius:50%;
  box-shadow:0 0 25px gold, 0 0 60px rgba(255,215,0,0.4);
  transition:0.4s;
}
.logo:hover{transform:scale(1.1) rotate(5deg);}

.hero h1{
  font-size:48px;
  background:linear-gradient(90deg,gold,white,gold);
  background-size:200% auto;
  -webkit-background-clip:text;
  color:transparent;
  animation:shine 3s linear infinite;
}
@keyframes shine{
  to{background-position:200% center;}
}

.tagline{
  font-size:18px;
  max-width:600px;
  margin:15px auto;
  color:#cbd5e1;
  line-height:1.6;
}

.btn{
  background:gold;
  color:black;
  padding:12px 25px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  margin:5px;
  display:inline-block;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px gold;
}

.section{text-align:center;padding:60px 20px;}

.cards{display:flex;flex-wrap:wrap;justify-content:center;}
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  margin:10px;
  padding:25px;
  border-radius:12px;
  width:260px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.price{font-size:32px;font-weight:bold}

#whale{
  font-size:18px;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{opacity:0.5}
  50%{opacity:1}
  100%{opacity:0.5}
}

footer{text-align:center;padding:20px;background:#02040a}
</style>
</head>

<body>

<nav>
  <div><b>UCoin</b></div>
  <div>
    <a href="#about">About</a>
    <a href="#token">Token</a>
    <a href="#roadmap">Roadmap</a>
  </div>
</nav>

<div class="hero">
  <img class="logo"
       src="https://files.catbox.moe/todfd5.jpg"
       onerror="this.src='https://via.placeholder.com/160?text=UC'">

  <h1>UCoin (UC)</h1>

  <p class="tagline">
  Community driven token built on trust, powered by growth, and designed for long-term value creation.
  </p>

  <a class="btn" href="https://t.me/ucoin_live">Telegram</a>
  <a class="btn" href="https://x.com/UCoin_live" target="_blank">X</a>

  <br><br>

  <a class="btn" target="_blank"
  href="https://jup.ag/swap?sell=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v&buy=Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt">
  Buy UCoin 💰
  </a>
</div>

<div class="section">
  <h2>Live Price</h2>
  <div id="price" class="price">Loading...</div>
</div>

<div class="section">
  <h2>Holders</h2>
  <h1 id="holders">Loading...</h1>
</div>

<div class="section">
  <h2>Whale Activity 🐋</h2>
  <div id="whale">Tracking...</div>
</div>

<div class="section">
  <h2>Live Chart</h2>
  <iframe 
    src="https://dexscreener.com/solana/6HPenRbShv4CjSmqqACAakDypYxbCtaf8UckZZ9dghtr"
    width="100%" height="500">
  </iframe>
</div>

<footer>
© 2026 UCoin • All Rights Reserved
</footer>

</body>
</html>
