<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCoin (UC)</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#05070d;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}
nav a{
  color:white;
  text-decoration:none;
  margin:0 10px;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}
.logo{
  width:140px;
  border-radius:50%;
  box-shadow:0 0 25px gold;
}
.hero h1{
  font-size:45px;
  background:linear-gradient(gold,white);
  -webkit-background-clip:text;
  color:transparent;
}
.tagline{
  color:#cbd5e1;
  max-width:600px;
  margin:10px auto;
}

/* BUTTON */
.btn{
  background:gold;
  color:black;
  padding:10px 20px;
  margin:5px;
  display:inline-block;
  border-radius:8px;
  text-decoration:none;
}

/* CONTRACT BOX */
.contract-box{
  margin-top:30px;
  padding:20px;
  border:1px dashed rgba(255,255,255,0.2);
  border-radius:12px;
  display:inline-block;
  background:rgba(255,255,255,0.03);
  box-shadow:0 0 15px rgba(255,215,0,0.2);
}

#contract{
  display:block;
  margin:10px 0;
  font-size:14px;
  color:#cbd5e1;
  word-break:break-all;
}

/* COPY BUTTON */
.copy-btn{
  padding:10px 25px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.copy-btn:hover{
  background:white;
  color:black;
  box-shadow:0 0 20px white;
}

.copy-btn.copied{
  background:#00ff9d;
  color:black;
  box-shadow:0 0 20px #00ff9d;
}

/* BUY BUTTON INSIDE BOX */
.buy-btn{
  margin-top:10px;
  display:inline-block;
}

/* SOCIAL ROW */
.social-row{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  background:#02040a;
  color:#94a3b8;
  margin-top:40px;
  font-size:14px;
}
</style>
</head>

<body>

<nav>
  <b>UCoin</b>
  <div>
    <a href="/about.html">About</a>
    <a href="/token.html">Token</a>
  </div>
</nav>

<div class="hero">
  <img class="logo" src="https://files.catbox.moe/todfd5.jpg">

  <h1>UCoin (UC)</h1>

  <p class="tagline">
  Community driven token built on trust, powered by growth, and designed for long-term value creation.
  </p>

  <!-- CONTRACT BOX -->
  <div class="contract-box">
    <p>Contract Address:</p>
    <span id="contract">Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt</span>

    <button onclick="copyText()" class="copy-btn">📋 COPY</button>

    <br><br>

    <!-- BUY inside box -->
    <a class="btn buy-btn" href="https://jup.ag/swap?inputMint=EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v&outputMint=Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt" target="_blank">
      Buy 💰
    </a>
  </div>

  <!-- SOCIAL BUTTONS -->
  <div class="social-row">
    <a class="btn" href="https://t.me/ucoin_live" target="_blank">Telegram</a>
    <a class="btn" href="https://x.com/UCoin_live" target="_blank">X</a>
    <a class="btn" href="https://www.instagram.com/ucoin_live" target="_blank">Instagram</a>
  </div>
</div>

<footer>
© 2026 UCoin • All Rights Reserved
</footer>

<script>
function copyText(){
  const text = document.getElementById("contract").innerText;
  const btn = document.querySelector(".copy-btn");

  navigator.clipboard.writeText(text);

  btn.innerText = "✔ Copied";
  btn.classList.add("copied");

  setTimeout(()=>{
    btn.innerText = "📋 COPY";
    btn.classList.remove("copied");
  },2000);
}
</script>

</body>
</html>
