<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokenomics | UCoin (UC) Official</title>
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/todfd5.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #03050a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 215, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            background: radial-gradient(circle at 50% 0%, #10141d 0%, var(--bg) 70%);
            min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(3, 5, 10, 0.8);
            backdrop-filter: blur(20px); position: fixed; top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-size: 24px; font-weight: 900; color: var(--gold); text-decoration: none; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 700; margin-left: 15px; font-size: 14px; }

        .container { max-width: 1000px; margin: 120px auto 60px; padding: 0 20px; text-align: center; }

        h1 {
            font-size: clamp(35px, 8vw, 55px); font-weight: 900;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* Stats Grid */
        .token-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .token-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 25px; border-radius: 24px; backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .token-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .label { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .value { font-size: 24px; font-weight: 900; }

        /* Contract Address Box */
        .ca-box {
            background: rgba(255,215,0,0.05); border: 1px dashed var(--gold);
            padding: 20px; border-radius: 16px; margin-bottom: 40px;
            cursor: pointer; transition: 0.3s;
        }
        .ca-box:hover { background: rgba(255,215,0,0.1); }
        .ca-text { font-family: monospace; font-size: 14px; color: #ccc; word-break: break-all; }

        /* Chart Section */
        .chart-container {
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px; border-radius: 24px; overflow: hidden; margin-top: 30px;
        }
        iframe { width: 100%; height: 500px; border: none; border-radius: 18px; }

        .btn-buy {
            display: inline-block; background: var(--gold); color: #000;
            padding: 18px 40px; border-radius: 16px; font-weight: 900;
            text-decoration: none; margin: 30px 0; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255,215,0,0.2);
        }
        .btn-buy:hover { transform: scale(1.05); }

        footer { padding: 40px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">UCOIN</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <div class="container">
        <h1>Token Details</h1>

        <div class="token-grid">
            <div class="token-card">
                <span class="label">Network</span>
                <span class="value">Solana</span>
            </div>
            <div class="token-card">
                <span class="label">Total Supply</span>
                <span class="value">1,000,000</span>
            </div>
            <div class="token-card">
                <span class="label">Ticker</span>
                <span class="value">$UC</span>
            </div>
        </div>

        <div class="ca-box" onclick="copyCA()">
            <span class="label">Contract Address (Click to Copy)</span>
            <div class="ca-text" id="ca">Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt</div>
        </div>

        <a href="https://jup.ag/swap?outputMint=Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt" class="btn-buy" target="_blank">BUY UCOIN ON JUPITER 💰</a>

        <h2 style="margin: 40px 0 20px; color: var(--gold);">Live Market Chart</h2>
        <div class="chart-container">
            <iframe 
                src="https://jup.ag/tokens/Gt92GsKA2TBudXo7uvfZsqMYu9tWHoMw21i4wRE2xszt">
            </iframe>
        </div>
    </div>

    <footer>
        © 2026 UCoin • Built for the Community
    </footer>

    <script>
        function copyCA() {
            const caText = document.getElementById("ca").innerText;
            navigator.clipboard.writeText(caText);
            alert("Contract Address Copied! ✅");
        }
    </script>
</body>
</html>
